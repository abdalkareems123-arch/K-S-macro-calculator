<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>K_S Nutrition System</title>

<style>

body{
    font-family: Arial, sans-serif;
    direction: rtl;
    background:#0d1b2a;
    padding:20px;
    color:#000;
    transition:0.3s;
}

.container{
    max-width:430px;
    margin:auto;
    background:#ffffff;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:15px;
}

.logo img{
    width:140px;
}

.language-switch{
    text-align:center;
    margin-bottom:15px;
}

.language-switch button{
    padding:8px 15px;
    margin:0 5px;
    border:none;
    border-radius:10px;
    background:#000;
    color:#fff;
    cursor:pointer;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.category-buttons button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#000;
    color:#fff;
    font-size:15px;
    cursor:pointer;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

select,input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
}

.calc-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#f4a019;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:25px;
    background:#f4a019;
    padding:18px;
    border-radius:15px;
    font-size:18px;
    text-align:center;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
    <img src="logo.jpg">
</div>

<div class="language-switch">
    <button onclick="setLang('ar')">العربية</button>
    <button onclick="setLang('en')">English</button>
</div>

<h2 id="title">K_S Alternate System</h2>

<div class="category-buttons" id="categoryButtons"></div>

<label id="mainLabel"></label>
<select id="mainItem"></select>

<label id="gramsLabel"></label>
<input type="number" id="grams">

<label id="altLabel"></label>
<select id="altItem"></select>

<button class="calc-btn" id="calcBtn" onclick="calculate()"></button>

<div class="result" id="resultBox"></div>

</div>

<script>

let currentLang = "ar";

const translations = {

ar:{
title:"K_S نظام البدائل",
mainLabel:"الصنف الأساسي",
gramsLabel:"عدد الغرامات في خطتك",
altLabel:"الصنف البديل",
calc:"احسب",
placeholder:"مثال 100",
error:"ادخل رقم صحيح",

categories:{
protein:"بروتين",
carbs:"كربوهيدرات",
fats:"دهون",
legumes:"بقوليات",
vegetables:"خضروات",
fruits:"فواكه",
dairy:"منتجات ألبان"
}
},

en:{
title:"K_S Alternate System",
mainLabel:"Main Item",
gramsLabel:"Grams In Your Plan",
altLabel:"Alternative Item",
calc:"Calculate",
placeholder:"Example 100",
error:"Enter valid number",

categories:{
protein:"Protein",
carbs:"Carbs",
fats:"Fats",
legumes:"Legumes",
vegetables:"Vegetables",
fruits:"Fruits",
dairy:"Dairy"
}
}

};

const database = {

protein:{
chicken:{ar:"صدر دجاج", en:"Chicken Breast", value:31},
thigh:{ar:"فخذ دجاج", en:"Chicken Thigh", value:24},
beef:{ar:"لحم بقري", en:"Beef", value:26},
tuna:{ar:"تونة", en:"Tuna", value:29}
},

carbs:{
rice:{ar:"أرز أبيض", en:"White Rice", value:28},
potato:{ar:"بطاطا", en:"Potato", value:20},
oats:{ar:"شوفان", en:"Oats", value:60}
},

fats:{
olive:{ar:"زيت زيتون", en:"Olive Oil", value:100},
almonds:{ar:"لوز", en:"Almonds", value:50}
},

legumes:{
lentils:{ar:"عدس", en:"Lentils", value:20},
beans:{ar:"فاصوليا", en:"Beans", value:22}
},

vegetables:{
broccoli:{ar:"بروكلي", en:"Broccoli", value:7},
tomato:{ar:"طماطم", en:"Tomato", value:5}
},

fruits:{
apple:{ar:"تفاح", en:"Apple", value:14},
banana:{ar:"موز", en:"Banana", value:23}
},

dairy:{
milk:{ar:"حليب", en:"Milk", value:5},
cheese:{ar:"جبنة", en:"Cheese", value:18}
}

};

let currentCategory = "protein";

function renderCategories(){

const container = document.getElementById("categoryButtons");
container.innerHTML = "";

for(let key in translations[currentLang].categories){

const btn = document.createElement("button");

btn.textContent = translations[currentLang].categories[key];

btn.onclick = () => setCategory(key);

container.appendChild(btn);

}

}

function setCategory(cat){

currentCategory = cat;

loadItems();

}

function loadItems(){

const main = document.getElementById("mainItem");
const alt = document.getElementById("altItem");

main.innerHTML = "";
alt.innerHTML = "";

for(let key in database[currentCategory]){

let item = database[currentCategory][key];

let option1 = document.createElement("option");
option1.value = key;
option1.text = item[currentLang];
main.appendChild(option1);

let option2 = document.createElement("option");
option2.value = key;
option2.text = item[currentLang];
alt.appendChild(option2);

}

}

function calculate(){

const main = document.getElementById("mainItem").value;
const alt = document.getElementById("altItem").value;
const grams = parseFloat(document.getElementById("grams").value);

if(!grams || grams <= 0){

alert(translations[currentLang].error);

return;

}

const mainValue = database[currentCategory][main].value;
const altValue = database[currentCategory][alt].value;

const totalMacro = (mainValue / 100) * grams;

const altGrams = (totalMacro / altValue) * 100;

let result;

if(currentLang === "ar"){

result =
grams + " جرام من " +
database[currentCategory][main].ar +
" = " +
altGrams.toFixed(0) +
" جرام من " +
database[currentCategory][alt].ar;

}else{

result =
grams + "g of " +
database[currentCategory][main].en +
" = " +
altGrams.toFixed(0) +
"g of " +
database[currentCategory][alt].en;

}

document.getElementById("resultBox").innerHTML = result;

document.getElementById("resultBox").style.display = "block";

}

function setLang(lang){

currentLang = lang;

document.documentElement.lang = lang;

document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";

document.body.style.direction = lang === "ar" ? "rtl" : "ltr";

document.getElementById("title").textContent =
translations[lang].title;

document.getElementById("mainLabel").textContent =
translations[lang].mainLabel;

document.getElementById("gramsLabel").textContent =
translations[lang].gramsLabel;

document.getElementById("altLabel").textContent =
translations[lang].altLabel;

document.getElementById("calcBtn").textContent =
translations[lang].calc;

document.getElementById("grams").placeholder =
translations[lang].placeholder;

renderCategories();

loadItems();

localStorage.setItem("lang", lang);

}

window.onload = () => {

const savedLang = localStorage.getItem("lang") || "ar";

setLang(savedLang);

};

</script>

</body>
</html>
