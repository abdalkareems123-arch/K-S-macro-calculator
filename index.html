<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Alternate Calculator</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    background:white;
    width:95%;
    max-width:500px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 15px 30px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

select,input{
    width:100%;
    padding:10px;
    margin:8px 0 15px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2ecc71;
    color:white;
    font-weight:bold;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#27ae60;
}

.result{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">
<h2>Macro Alternate Calculator</h2>

<label>Choose Category</label>
<select id="category" onchange="updateOptions()">
<option value="protein">Protein</option>
<option value="carbs">Carbs</option>
<option value="fats">Fats</option>
</select>

<label>Choose Source</label>
<select id="source"></select>

<label>Enter Quantity (grams)</label>
<input type="number" id="quantity" placeholder="مثلاً 100">

<label>Choose Target</label>
<select id="target"></select>

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>
</div>

<script>

const data = {
protein:{
"Chicken Breast":31,
"Beef":26,
"Tuna":22,
"Turkey":25,
"Eggs":13
},
carbs:{
"Rice":28,
"Pasta":25,
"Potato":17,
"Oats":66,
"Bread":49
},
fats:{
"Olive Oil":100,
"Butter":81,
"Peanut Butter":50,
"Almonds":49,
"Avocado":15
}
};

function updateOptions(){
const category = document.getElementById("category").value;
const source = document.getElementById("source");
const target = document.getElementById("target");

source.innerHTML="";
target.innerHTML="";

for(let item in data[category]){
    source.innerHTML += `<option value="${data[category][item]}">${item} (${data[category][item]}g per 100g)</option>`;
    target.innerHTML += `<option value="${data[category][item]}">${item} (${data[category][item]}g per 100g)</option>`;
}
}

function calculate(){
const sourceValue = parseFloat(document.getElementById("source").value);
const targetValue = parseFloat(document.getElementById("target").value);
const quantity = parseFloat(document.getElementById("quantity").value);

if(!quantity){
alert("Enter quantity first");
return;
}

const result = (quantity * sourceValue) / targetValue;

document.getElementById("result").innerHTML =
`You need <span style="color:#2ecc71">${result.toFixed(1)}g</span> of target food.`;
}

updateOptions();

</script>

</body>
</html>
